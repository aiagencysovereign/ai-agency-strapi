services:
  - type: web
    name: ai-agency-strapi
    env: node
    region: frankfurt
    plan: free
    nodeVersion: 20.11.0
    buildCommand: npm install && NODE_ENV=production npm run build
    startCommand: NODE_ENV=production npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_CLIENT
        value: sqlite
      - key: DATABASE_FILENAME
        value: .tmp/data.db
